<style>
/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff;
  --bg2: #f7f7f5;
  --bg3: #f0f0ec;
  --text: #1a1a18;
  --text2: #5a5a56;
  --text3: #9a9a94;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);
  --accent: #1a5fa8;
  --accent-light: #e6f0fb;
  --accent-dark: #0d3f74;
  --red: #c23b3b;
  --red-light: #fceaea;
  --amber: #c27a0a;
  --amber-light: #fdf3dc;
  --green: #2d7a3a;
  --green-light: #e8f5eb;
  --purple: #5a3a9e;
  --purple-light: #f0ebff;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 8px rgba(0,0,0,0.04);
  --radius: 8px;
  --radius-lg: 12px;
  font-size: 14px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #242422; --bg3: #2a2a28;
    --text: #f0f0ec; --text2: #a0a09a; --text3: #666662;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --accent: #4a8fd4; --accent-light: #0d2540; --accent-dark: #6aaee8;
    --red: #e06060; --red-light: #2a1515;
    --amber: #e0a030; --amber-light: #2a2010;
    --green: #50c060; --green-light: #102215;
    --purple: #9a7ae0; --purple-light: #1a1230;
  }
}
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg3); color: var(--text); line-height: 1.5; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
a { color: var(--accent); text-decoration: none; }

/* ─── Layout ─── */
.app { display: flex; height: 100vh; }
.sidebar { width: 230px; min-width: 230px; background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.topbar { height: 54px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; }
.content { flex: 1; overflow-y: auto; padding: 20px; }

/* ─── Sidebar ─── */
.sidebar-logo { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); }
.sidebar-logo .logo-mark { font-size: 20px; margin-bottom: 2px; }
.sidebar-logo h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.sidebar-logo p { font-size: 11px; color: var(--text3); margin-top: 1px; }
.nav-section { padding: 10px 0 4px; }
.nav-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; padding: 4px 18px 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 18px; cursor: pointer; color: var(--text2); font-size: 13px; transition: all .12s; border-left: 2px solid transparent; user-select: none; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .7; }
.nav-item:hover { background: var(--bg2); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); border-left-color: var(--accent); font-weight: 500; }
.nav-item.active svg { opacity: 1; }
.nav-badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 99px; }
.sidebar-footer { margin-top: auto; padding: 14px 18px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); line-height: 1.6; }
.sidebar-footer strong { color: var(--text2); display: block; font-size: 12px; }

/* ─── Topbar ─── */
.topbar-title { font-size: 15px; font-weight: 600; flex: 1; letter-spacing: -0.01em; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

/* ─── Buttons ─── */
.btn { padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; transition: all .12s; font-weight: 500; white-space: nowrap; }
.btn:hover { background: var(--bg2); border-color: var(--border2); }
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { background: var(--red-light); color: var(--red); border-color: transparent; }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-success { background: var(--green-light); color: var(--green); border-color: transparent; }
.btn-success:hover { background: var(--green); color: #fff; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--bg2); color: var(--text); border-color: transparent; }
.btn-icon { padding: 5px; width: 28px; height: 28px; justify-content: center; border-color: transparent; background: transparent; }
.btn-icon:hover { background: var(--bg2); }

/* ─── Cards & Metrics ─── */
.card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
.metric-card { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; }
.metric-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; font-weight: 500; }
.metric-value { font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; line-height: 1; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ─── Grids ─── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
@media (max-width: 900px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: 1fr 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
}

/* ─── Tables ─── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { text-align: left; padding: 9px 14px; font-size: 11px; font-weight: 600; color: var(--text3); border-bottom: 1px solid var(--border); background: var(--bg2); text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg2); }

/* ─── Badges ─── */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-blue { background: var(--accent-light); color: var(--accent); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-gray { background: var(--bg3); color: var(--text2); }
.badge-purple { background: var(--purple-light); color: var(--purple); }

/* ─── Forms ─── */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
.form-control { width: 100%; padding: 8px 10px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; transition: border-color .12s; }
.form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,95,168,.1); }
textarea.form-control { resize: vertical; min-height: 70px; }
select.form-control { appearance: auto; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ─── Modal ─── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 16px; animation: fadein .15s; }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
.modal { background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border2); width: 100%; max-width: 640px; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); animation: slidein .15s; }
@keyframes slidein { from { transform: translateY(-12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-lg { max-width: 800px; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 1; }
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-body { padding: 20px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; background: var(--bg2); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }

/* ─── Inline elements ─── */
.section-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--text); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: var(--text2); }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.text-muted { color: var(--text2); }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }
.gap-4 { display: flex; gap: 4px; }
.gap-8 { display: flex; gap: 8px; align-items: center; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }

/* ─── List items ─── */
.list-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.list-item:last-child { border-bottom: none; }
.list-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.dot-red { background: var(--red); }
.dot-amber { background: var(--amber); }
.dot-green { background: var(--green); }
.dot-blue { background: var(--accent); }
.dot-gray { background: var(--text3); }

/* ─── Financial ─── */
.fin-pos { color: var(--green); font-weight: 600; }
.fin-neg { color: var(--red); font-weight: 600; }

/* ─── Calendar ─── */
.cal-wrap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-header { text-align: center; font-size: 11px; font-weight: 600; color: var(--text3); padding: 6px 2px; text-transform: uppercase; letter-spacing: .04em; }
.cal-cell { min-height: 72px; padding: 5px; border: 1px solid var(--border); border-radius: 6px; font-size: 11px; cursor: pointer; transition: background .1s; position: relative; }
.cal-cell:hover { background: var(--bg2); }
.cal-cell.today { border-color: var(--accent); background: var(--accent-light); }
.cal-cell.other { opacity: .35; pointer-events: none; }
.cal-day-num { font-weight: 600; font-size: 12px; margin-bottom: 3px; color: var(--text); }
.cal-evt { font-size: 10px; padding: 1px 4px; border-radius: 3px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-evt-agenda { background: var(--accent); color: #fff; }
.cal-evt-prazo { background: var(--red); color: #fff; }
.cal-evt-task { background: var(--amber); color: #fff; }

/* ─── Progress ─── */
.progress-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; }

/* ─── Alert ─── */
.alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; display: flex; align-items: flex-start; gap: 8px; }
.alert-warn { background: var(--amber-light); color: var(--amber); border: 1px solid rgba(194,122,10,.2); }
.alert-danger { background: var(--red-light); color: var(--red); border: 1px solid rgba(194,59,59,.2); }
.alert-info { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(26,95,168,.2); }

/* ─── Avatar ─── */
.avatar { border-radius: 50%; background: var(--accent-light); color: var(--accent); font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* ─── Tabs ─── */
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; gap: 0; }
.tab { padding: 8px 16px; cursor: pointer; font-size: 13px; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .12s; font-weight: 500; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }

/* ─── Search ─── */
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--text3); pointer-events: none; }
.search-wrap input { padding-left: 30px; }

/* ─── Empty state ─── */
.empty { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty svg { width: 40px; height: 40px; margin: 0 auto 12px; display: block; opacity: .4; }
.empty p { font-size: 13px; }

/* ─── Tooltip ─── */
[title] { cursor: help; }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ─── Print ─── */
@media print {
  .sidebar, .topbar, .topbar-actions, .btn, .btn-icon, .action-row { display: none !important; }
  .main { display: block; }
  .content { overflow: visible; }
}

/* ─── Responsive sidebar ─── */
@media (max-width: 768px) {
  .sidebar { width: 0; min-width: 0; overflow: hidden; }
  .sidebar.open { width: 230px; min-width: 230px; position: fixed; z-index: 100; height: 100%; box-shadow: 4px 0 20px rgba(0,0,0,.2); }
}
.action-row { display: flex; gap: 4px; align-items: center; }

/* ─── Pill filter ─── */
.filter-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.pill { padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); font-size: 12px; cursor: pointer; transition: all .12s; font-weight: 500; }
.pill:hover { background: var(--bg2); }
.pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ─── Tag ─── */
.tag { display: inline-block; padding: 2px 8px; background: var(--bg3); color: var(--text2); border-radius: 4px; font-size: 11px; }

/* ─── Nota/destaque ─── */
.nota-box { background: var(--amber-light); border-left: 3px solid var(--amber); border-radius: 0 var(--radius) var(--radius) 0; padding: 8px 12px; font-size: 12px; color: var(--text2); margin-top: 8px; }

/* ─── Detail pane ─── */
.detail-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 20px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
.detail-field label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 3px; }
.detail-field p { font-size: 13px; color: var(--text); }
</style>
</head>

<script>
'use strict';

// ══════════════════════════════════════════
// GOOGLE DRIVE CONFIG
// ══════════════════════════════════════════
const GOOG_CLIENT_ID = '370368544958-h1059ab95mgluc1a2s9qb0m2afau9ork.apps.googleusercontent.com';
const GOOG_SCOPES    = 'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/userinfo.email';
const DB_FILENAME    = 'lexoffice-db.json';
const LS_KEY         = 'lexoffice_v2';

// Drive state
let gToken       = null;
let gFileId      = null;
let gSaving      = false;
let gSavePending = false;
let gUserName    = '';
let gTokenClient = null; // GIS token client

// ── Status bar ──────────────────────────────
function setDriveStatus(msg, type) {
  const el = document.getElementById('drive-status');
  if (!el) return;
  const icons = { ok:'☁️', saving:'⏳', warn:'⚠️', error:'❌', offline:'💾', auth:'🔑' };
  el.textContent = (icons[type]||'') + ' ' + msg;
  el.style.color = type==='error' ? 'var(--red)' : type==='ok' ? 'var(--green)' : type==='saving' ? 'var(--accent)' : 'var(--amber)';
}

// ── Inicializa GIS token client ──────────────
function initGIS() {
  if (!window.google) { setTimeout(initGIS, 300); return; }
  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOG_CLIENT_ID,
    scope:     GOOG_SCOPES,
    callback:  async (resp) => {
      if (resp.error) {
        setDriveStatus('Erro no login: ' + resp.error, 'error');
        return;
      }
      gToken = resp.access_token;
      // GIS tokens expiram em 1h — agenda renovação
      setTimeout(renovarToken, (resp.expires_in - 60) * 1000);
      await afterLogin();
    },
  });
}

function renovarToken() {
  if (!gTokenClient) return;
  // Solicita novo token silenciosamente (sem popup se já autorizado)
  gTokenClient.requestAccessToken({ prompt: '' });
}

// ── Login / Logout ───────────────────────────
function driveLogin() {
  if (!gTokenClient) { setDriveStatus('Biblioteca Google ainda carregando, tente em 2s…', 'warn'); setTimeout(driveLogin, 1500); return; }
  setDriveStatus('Abrindo login Google…', 'auth');
  gTokenClient.requestAccessToken({ prompt: 'select_account' });
}

function driveLogout() {
  if (gToken) google.accounts.oauth2.revoke(gToken, () => {});
  gToken = null; gFileId = null; gUserName = '';
  updateDriveUI();
  setDriveStatus('Desconectado — salvando localmente', 'offline');
}

async function afterLogin() {
  setDriveStatus('Conectado. Carregando dados…', 'saving');
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
      { headers: { Authorization: 'Bearer ' + gToken } });
    const u = await r.json();
    gUserName = u.name || u.email || '';
  } catch(e) {}
  updateDriveUI();
  await driveLoadOrCreate();
}

function updateDriveUI() {
  const el = document.getElementById('drive-user');
  if (el) el.textContent = gUserName ? '👤 ' + gUserName : '';
  const btnLogin  = document.getElementById('btn-drive-login');
  const btnLogout = document.getElementById('btn-drive-logout');
  const btnSync   = document.getElementById('btn-drive-sync');
  if (btnLogin)  btnLogin.style.display  = gToken ? 'none' : '';
  if (btnLogout) btnLogout.style.display = gToken ? '' : 'none';
  if (btnSync)   btnSync.style.display   = gToken ? '' : 'none';
}

// ── Drive API helpers ────────────────────────
async function driveReq(url, opts={}) {
  if (!gToken) throw new Error('Sem token');
  const headers = { Authorization: 'Bearer ' + gToken, ...(opts.headers||{}) };
  const res = await fetch(url, { ...opts, headers });
  if (res.status === 401) {
    gToken = null; updateDriveUI();
    setDriveStatus('Sessão expirada — faça login novamente', 'error');
    throw new Error('401');
  }
  return res;
}

async function driveFindFile() {
  const res = await driveReq(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27${DB_FILENAME}%27&fields=files(id,name,modifiedTime)`
  );
  const data = await res.json();
  return data.files && data.files.length ? data.files[0] : null;
}

async function driveReadFile(fileId) {
  const res = await driveReq(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`
  );
  return await res.json();
}

async function driveWriteFile(fileId, content) {
  const body = JSON.stringify(content);
  if (fileId) {
    await driveReq(
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
      { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body }
    );
  } else {
    const meta = JSON.stringify({ name: DB_FILENAME, parents: ['appDataFolder'] });
    const boundary = 'lex_boundary_x7z';
    const mp = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
    const res = await driveReq(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      { method: 'POST', headers: { 'Content-Type': `multipart/related; boundary=${boundary}` }, body: mp }
    );
    const data = await res.json();
    gFileId = data.id;
  }
}

async function driveLoadOrCreate() {
  try {
    const file = await driveFindFile();
    if (file) {
      gFileId = file.id;
      const data = await driveReadFile(file.id);
      if (data && data.processos) {
        DB = data;
        DB.documentos = DB.documentos || [];
        DB.config     = DB.config     || {};
        saveLocalFallback();
        render(); updateBadges();
        setDriveStatus('Sincronizado (' + new Date().toLocaleTimeString('pt-BR') + ')', 'ok');
      } else {
        setDriveStatus('Arquivo no Drive vazio — usando dados locais', 'warn');
      }
    } else {
      setDriveStatus('Primeiro acesso — enviando dados ao Drive…', 'saving');
      await driveWriteFile(null, DB);
      setDriveStatus('Base criada no Drive!', 'ok');
    }
  } catch(e) {
    setDriveStatus('Erro: ' + e.message, 'error');
  }
}

async function driveSyncNow() {
  if (!gToken) return alert('Faça login no Google Drive primeiro.');
  setDriveStatus('Sincronizando…', 'saving');
  await driveLoadOrCreate();
}

// ── saveDB ────────────────────────────────────
function saveLocalFallback() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(DB)); } catch(e) {}
}

async function saveDB() {
  saveLocalFallback();
  if (!gToken) { setDriveStatus('Salvo localmente (Drive desconectado)', 'offline'); return; }
  if (gSaving) { gSavePending = true; return; }
  gSaving = true;
  setDriveStatus('Salvando…', 'saving');
  try {
    if (!gFileId) { const f = await driveFindFile(); gFileId = f ? f.id : null; }
    await driveWriteFile(gFileId, DB);
    setDriveStatus('Salvo no Drive (' + new Date().toLocaleTimeString('pt-BR') + ')', 'ok');
  } catch(e) {
    setDriveStatus('Erro ao salvar: ' + e.message, 'error');
  } finally {
    gSaving = false;
    if (gSavePending) { gSavePending = false; saveDB(); }
  }
}

// UTILS

function uid() { return 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function today() { return new Date().toISOString().slice(0, 10); }
function fmtDate(d) { if (!d) return '—'; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
function daysUntil(ds) {
  const t = new Date(); t.setHours(0,0,0,0);
  const a = new Date(ds + 'T00:00:00');
  return Math.round((a - t) / 86400000);
}
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(name) { return (name||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function brlMoney(v) { return Number(v||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }

// Badges
function badgeSituacao(s) {
  const map = {'Ativo':'badge-green','Arquivado':'badge-gray','Suspenso':'badge-amber','Falhado':'badge-red'};
  return `<span class="badge ${map[s]||'badge-gray'}">${escHtml(s)}</span>`;
}
function badgeTipo(t) {
  const map = {'Cível':'badge-blue','Trabalhista':'badge-purple','Cumprimento de Sentença':'badge-amber','Execução':'badge-amber','Recursal':'badge-gray','Sucessório':'badge-green','Criminal':'badge-red','Federal':'badge-purple','Fazenda Pública':'badge-gray'};
  return `<span class="badge ${map[t]||'badge-gray'}" style="font-size:10px">${escHtml(t)}</span>`;
}
function badgePriority(p) {
  const map = {'Alta':'badge-red','Média':'badge-amber','Baixa':'badge-gray'};
  return `<span class="badge ${map[p]||'badge-gray'}">${escHtml(p)}</span>`;
}
function badgeStatus(s) {
  const map = {'Ativo':'badge-green','Recebido':'badge-green','Pago':'badge-green','Concluída':'badge-green','Concluído':'badge-green','Em andamento':'badge-blue','Pendente':'badge-amber','Arquivado':'badge-gray','Cancelado':'badge-red'};
  return `<span class="badge ${map[s]||'badge-gray'}">${escHtml(s)}</span>`;
}

function updateBadges() {
  const prUrgent = DB.prazos.filter(p => p.status === 'Pendente' && daysUntil(p.data) <= 7).length;
  const tarPend = DB.tarefas.filter(t => t.status !== 'Concluída').length;
  const elP = document.getElementById('badge-prazos');
  const elT = document.getElementById('badge-tarefas');
  if (elP) { elP.style.display = prUrgent > 0 ? '' : 'none'; elP.textContent = prUrgent; }
  if (elT) { elT.style.display = tarPend > 0 ? '' : 'none'; elT.textContent = tarPend; }
}

  currentPage = page;

  document.getElementById('page-title').textContent = titles[page] || page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);

}

function renderDashboard() {
  const ativos = DB.processos.filter(p => p.situacao === 'Ativo').length;
  const arq = DB.processos.filter(p => p.situacao === 'Arquivado').length;
  const prUrgent = DB.prazos.filter(p => p.status === 'Pendente' && daysUntil(p.data) <= 7);
  const tarPend = DB.tarefas.filter(t => t.status !== 'Concluída').length;
  const receitas = DB.financeiro.filter(f => f.tipo === 'Receita' && f.status !== 'Cancelado').reduce((s,f) => s + (f.valor||0), 0);
  const despesas = DB.financeiro.filter(f => f.tipo === 'Despesa').reduce((s,f) => s + (f.valor||0), 0);
  const pendFin = DB.financeiro.filter(f => f.tipo === 'Receita' && f.status === 'Pendente').reduce((s,f) => s + (f.valor||0), 0);
  const proxPrazos = [...DB.prazos].filter(p => p.status === 'Pendente').sort((a,b) => a.data.localeCompare(b.data)).slice(0, 6);
  const proxAgenda = [...DB.agenda].sort((a,b) => (a.data+a.hora).localeCompare(b.data+b.hora)).slice(0, 5);
  const proxTarefas = [...DB.tarefas].filter(t => t.status !== 'Concluída').sort((a,b) => (a.prazo||'9').localeCompare(b.prazo||'9')).slice(0, 5);

  return `
<div class="grid-4 mb-20">
  <div class="metric-card"><div class="metric-label">Processos ativos</div><div class="metric-value">${ativos}</div><div class="metric-sub">${arq} arquivados · ${DB.processos.length} total</div></div>
  <div class="metric-card"><div class="metric-label">Prazos urgentes</div><div class="metric-value" style="color:${prUrgent.length?'var(--red)':'inherit'}">${prUrgent.length}</div><div class="metric-sub">próximos 7 dias</div></div>
  <div class="metric-card"><div class="metric-label">Tarefas abertas</div><div class="metric-value">${tarPend}</div><div class="metric-sub">${DB.tarefas.filter(t=>t.status==='Em andamento').length} em andamento</div></div>
  <div class="metric-card"><div class="metric-label">Saldo financeiro</div><div class="metric-value" style="font-size:20px;color:${receitas-despesas>=0?'var(--green)':'var(--red)'}">R$ ${brlMoney(receitas-despesas)}</div><div class="metric-sub" style="color:${pendFin>0?'var(--amber)':'inherit'}">R$ ${brlMoney(pendFin)} a receber</div></div>
</div>

${prUrgent.length ? `<div class="alert alert-danger mb-16">⚠️ <strong>${prUrgent.length} prazo(s) urgente(s)</strong> nos próximos 7 dias: ${prUrgent.slice(0,3).map(p=>`<strong>${p.titulo}</strong> (${fmtDate(p.data)})`).join(', ')}${prUrgent.length>3?'…':''}.</div>` : ''}

<div class="grid-2">
  <div class="card">
    <div class="section-title">Prazos próximos <button class="btn btn-sm btn-ghost" onclick="navigate('prazos')">Ver todos →</button></div>
    ${proxPrazos.length ? proxPrazos.map(p => {
      const d = daysUntil(p.data);
      const cls = d < 0 ? 'dot-gray' : d <= 2 ? 'dot-red' : d <= 7 ? 'dot-amber' : 'dot-blue';
      const lbl = d < 0 ? `${Math.abs(d)}d atrás` : d === 0 ? 'Hoje' : `em ${d}d`;
      return `<div class="list-item"><div class="list-item-dot ${cls}"></div><div style="flex:1;min-width:0"><div class="truncate" style="font-size:13px;font-weight:500">${escHtml(p.titulo)}</div><div class="mono truncate">${escHtml(p.processo||'—')}</div></div><span class="badge ${d<=2?'badge-red':d<=7?'badge-amber':'badge-gray'}" style="flex-shrink:0">${lbl}</span></div>`;
    }).join('') : '<div class="empty"><p>Nenhum prazo pendente</p></div>'}
  </div>

  <div class="card">
    <div class="section-title">Agenda <button class="btn btn-sm btn-ghost" onclick="navigate('agenda')">Ver agenda →</button></div>
    ${proxAgenda.length ? proxAgenda.map(e => `<div class="list-item"><div class="list-item-dot dot-blue"></div><div style="flex:1;min-width:0"><div class="truncate" style="font-size:13px;font-weight:500">${escHtml(e.titulo)}</div><div class="mono">${fmtDate(e.data)} ${e.hora} — ${escHtml(e.local||'—')}</div></div><span class="badge badge-blue" style="flex-shrink:0;font-size:10px">${escHtml(e.tipo)}</span></div>`).join('') : '<div class="empty"><p>Nenhum evento</p></div>'}
  </div>

  <div class="card">
    <div class="section-title">Tarefas abertas <button class="btn btn-sm btn-ghost" onclick="navigate('tarefas')">Ver todas →</button></div>
    ${proxTarefas.length ? proxTarefas.map(t => `<div class="list-item"><div class="list-item-dot ${t.prioridade==='Alta'?'dot-red':t.prioridade==='Média'?'dot-amber':'dot-blue'}"></div><div style="flex:1;min-width:0"><div class="truncate" style="font-size:13px;font-weight:500">${escHtml(t.titulo)}</div><div class="mono">${t.prazo?fmtDate(t.prazo):''}</div></div>${badgeStatus(t.status)}</div>`).join('') : '<div class="empty"><p>Nenhuma tarefa aberta</p></div>'}
  </div>

  <div class="card">
    <div class="section-title">Lançamentos recentes <button class="btn btn-sm btn-ghost" onclick="navigate('financeiro')">Ver todos →</button></div>
    ${[...DB.financeiro].sort((a,b)=>b.data.localeCompare(a.data)).slice(0,6).map(f=>`<div class="list-item"><div class="list-item-dot ${f.tipo==='Receita'?'dot-green':'dot-red'}"></div><div style="flex:1;min-width:0"><div class="truncate" style="font-size:13px">${escHtml(f.descricao)}</div><div class="mono">${fmtDate(f.data)}</div></div><span class="${f.tipo==='Receita'?'fin-pos':'fin-neg'}" style="flex-shrink:0;font-size:13px">${f.tipo==='Receita'?'+':'−'} R$ ${brlMoney(f.valor)}</span></div>`).join('')}
  </div>
</div>`;
}

    <div class="detail-field"><label>Polo</label><p>${escHtml(p.polo||'—')}</p></div>
    <div class="detail-field"><label>Cliente</label><p>${escHtml(p.cliente||'—')}</p></div>

  ${fin.length ? `<div class="divider"></div><div class="section-title">Lançamentos financeiros</div>${fin.map(f=>`<div class="list-item"><div class="list-item-dot ${f.tipo==='Receita'?'dot-green':'dot-red'}"></div><div style="flex:1"><span style="font-size:13px">${escHtml(f.descricao)}</span></div><span class="${f.tipo==='Receita'?'fin-pos':'fin-neg'}">R$ ${brlMoney(f.valor)}</span></div>`).join('')}` : ''}
</div>
<div class="modal-footer"><button class="btn" onclick="closeModal()">Fechar</button><button class="btn btn-primary" onclick="closeModal();modalProcesso('${id}')">Editar</button></div>`);

// AGENDA
// ══════════════════════════════════════════
function renderAgenda() {
  const now = new Date();
  const ano = now.getFullYear(), mes = now.getMonth();
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const semana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const primeiro = new Date(ano, mes, 1).getDay();
  const ultimo = new Date(ano, mes+1, 0).getDate();
  const todayN = now.getDate();

  let cells = semana.map(d => `<div class="cal-header">${d}</div>`).join('');
  for (let i = 0; i < primeiro; i++) {
    cells += `<div class="cal-cell other"><div class="cal-day-num">${new Date(ano,mes,1-primeiro+i).getDate()}</div></div>`;
  }
  for (let d = 1; d <= ultimo; d++) {
    const ds = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs = DB.agenda.filter(e => e.data === ds);
    const prs = DB.prazos.filter(p => p.data === ds && p.status === 'Pendente');
    const isT = d === todayN;
    cells += `<div class="cal-cell ${isT?'today':''}">
      <div class="cal-day-num">${d}</div>
      ${evs.map(e=>`<div class="cal-evt cal-evt-agenda" title="${escHtml(e.titulo)}">${e.hora} ${escHtml(e.titulo.slice(0,18))}</div>`).join('')}
      ${prs.map(p=>`<div class="cal-evt cal-evt-prazo" title="${escHtml(p.titulo)}">⚠ ${escHtml(p.titulo.slice(0,16))}</div>`).join('')}
    </div>`;
  }

  const sorted = [...DB.agenda].sort((a,b) => (a.data+a.hora).localeCompare(b.data+b.hora));

  return `<div class="card mb-20">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <h2 style="font-size:15px;font-weight:600">${meses[mes]} ${ano}</h2>
    <div style="display:flex;gap:6px"><span class="badge badge-blue">● Evento</span><span class="badge badge-red">● Prazo</span></div>
  </div>
  <div class="cal-wrap">${cells}</div>
</div>
<div class="card">
  <div class="section-title">Todos os eventos</div>
  ${sorted.length ? sorted.map(e => `<div class="list-item">
    <div class="list-item-dot dot-blue"></div>
    <div style="flex:1;min-width:0">
      <div class="truncate" style="font-size:13px;font-weight:500">${escHtml(e.titulo)}</div>
      <div class="mono">${fmtDate(e.data)} às ${e.hora} · ${escHtml(e.local||'—')}</div>
      ${e.notas?`<div class="text-xs text-muted">${escHtml(e.notas)}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
      <span class="badge badge-blue" style="font-size:10px">${escHtml(e.tipo)}</span>
      <div class="action-row">
        <button class="btn btn-icon btn-ghost" onclick="modalAgenda('${e.id}')">✏️</button>
        <button class="btn btn-icon btn-ghost" onclick="delItem('agenda','${e.id}')">🗑️</button>
      </div>
    </div>
  </div>`).join('') : '<div class="empty"><p>Nenhum evento cadastrado.</p></div>'}
</div>`;
}

function renderRelatorios() {

  // Por tribunal
  const byTrib = {}; DB.processos.forEach(p=>{byTrib[p.tribunal]=(byTrib[p.tribunal]||0)+1;});
  const tribList = Object.entries(byTrib).sort((a,b)=>b[1]-a[1]);

  // Financeiro
  const rec = DB.financeiro.filter(f=>f.tipo==='Receita'&&f.status!=='Cancelado').reduce((s,f)=>s+(f.valor||0),0);

  return `
<div class="grid-4 mb-20">

  <div class="metric-card"><div class="metric-label">Ativos</div><div class="metric-value" style="color:var(--accent)">${ativos}</div></div>

<div class="grid-2">

    <div class="section-title">Distribuição por tipo</div>
    ${tipoList.map(([k,v])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:13px">${escHtml(k)}</span><span class="text-sm text-muted">${v}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.round(v/total*100)}%"></div></div></div>`).join('')}
  </div>
  <div class="card">
    <div class="section-title">Distribuição por tribunal</div>
    ${tribList.map(([k,v])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:13px">${escHtml(k)}</span><span class="text-sm text-muted">${v}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.round(v/total*100)}%;background:var(--green)"></div></div></div>`).join('')}
  </div>
  <div class="card">
    <div class="section-title">Por instância</div>
    ${Object.entries(byInst).map(([k,v])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:13px">${escHtml(k)}</span><span class="text-sm text-muted">${v}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.round(v/total*100)}%;background:var(--purple)"></div></div></div>`).join('')}

    <div class="section-title">Top clientes por processos</div>
    ${topClientes.map(([n,v])=>`<div class="list-item" style="padding:7px 0">

    <div class="form-group"><label class="form-label">Título *</label><input class="form-control" id="tf-tit" value="${escHtml(t.titulo)}"></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Prazo</label><input class="form-control" type="date" id="tf-pra" value="${t.prazo}"></div><div class="form-group"><label class="form-label">Prioridade</label><select class="form-control" id="tf-pri"><option ${t.prioridade==='Alta'?'selected':''}>Alta</option><option ${t.prioridade==='Média'?'selected':''}>Média</option><option ${t.prioridade==='Baixa'?'selected':''}>Baixa</option></select></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Status</label><select class="form-control" id="tf-sta"><option ${t.status==='Pendente'?'selected':''}>Pendente</option><option ${t.status==='Em andamento'?'selected':''}>Em andamento</option><option ${t.status==='Concluída'?'selected':''}>Concluída</option></select></div><div class="form-group"><label class="form-label">Responsável</label><input class="form-control" id="tf-resp" value="${escHtml(t.responsavel)}"></div></div>
    <div class="form-group"><label class="form-label">Processo (opcional)</label><input class="form-control" id="tf-proc" value="${escHtml(t.processo)}" placeholder="Número CNJ"></div>
    <div class="form-group"><label class="form-label">Notas</label><textarea class="form-control" id="tf-notas" rows="2">${escHtml(t.notas)}</textarea></div>`,
  `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveTarefa('${id||''}')">Salvar</button>`));
}
function saveTarefa(id) {
  const obj = { id:id||uid(), titulo:document.getElementById('tf-tit').value.trim(), processo:document.getElementById('tf-proc').value.trim(), prazo:document.getElementById('tf-pra').value, prioridade:document.getElementById('tf-pri').value, status:document.getElementById('tf-sta').value, responsavel:document.getElementById('tf-resp').value.trim(), notas:document.getElementById('tf-notas').value.trim(), criado:id?(DB.tarefas.find(x=>x.id===id)||{}).criado||today():today() };
  if (!obj.titulo) return alert('Título é obrigatório.');
  if (id) { const i = DB.tarefas.findIndex(x=>x.id===id); if(i>=0) DB.tarefas[i]=obj; } else DB.tarefas.push(obj);
  saveDB(); closeModal(); render(); updateBadges();
}

// FINANCEIRO
function modalFinanceiro(id) {
  const f = id ? DB.financeiro.find(x=>x.id===id) : {id:'',tipo:'Receita',descricao:'',valor:0,data:today(),processo:'',cliente:'',status:'Pendente'};
  const clOpts = DB.clientes.map(c=>`<option value="${escHtml(c.nome)}" ${f.cliente===c.nome?'selected':''}>${escHtml(c.nome)}</option>`).join('');
  showModal(buildModal(id?'Editar lançamento':'Novo lançamento', `
    <div class="form-row"><div class="form-group"><label class="form-label">Tipo</label><select class="form-control" id="ff-tipo"><option ${f.tipo==='Receita'?'selected':''}>Receita</option><option ${f.tipo==='Despesa'?'selected':''}>Despesa</option></select></div><div class="form-group"><label class="form-label">Status</label><select class="form-control" id="ff-sta"><option ${f.status==='Pendente'?'selected':''}>Pendente</option><option ${f.status==='Recebido'?'selected':''}>Recebido</option><option ${f.status==='Pago'?'selected':''}>Pago</option><option ${f.status==='Cancelado'?'selected':''}>Cancelado</option></select></div></div>
    <div class="form-group"><label class="form-label">Descrição *</label><input class="form-control" id="ff-des" value="${escHtml(f.descricao)}"></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Valor (R$) *</label><input class="form-control" type="number" id="ff-val" value="${f.valor||0}" min="0" step="0.01"></div><div class="form-group"><label class="form-label">Data</label><input class="form-control" type="date" id="ff-dat" value="${f.data}"></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Cliente</label><select class="form-control" id="ff-cli"><option value="">— nenhum —</option>${clOpts}</select></div><div class="form-group"><label class="form-label">Processo (opcional)</label><input class="form-control" id="ff-proc" value="${escHtml(f.processo)}"></div></div>`,
  `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveFinanceiro('${id||''}')">Salvar</button>`));
}
function saveFinanceiro(id) {
  const obj = { id:id||uid(), tipo:document.getElementById('ff-tipo').value, descricao:document.getElementById('ff-des').value.trim(), valor:parseFloat(document.getElementById('ff-val').value)||0, data:document.getElementById('ff-dat').value, processo:document.getElementById('ff-proc').value.trim(), cliente:document.getElementById('ff-cli').value, status:document.getElementById('ff-sta').value, criado:id?(DB.financeiro.find(x=>x.id===id)||{}).criado||today():today() };
  if (!obj.descricao) return alert('Descrição é obrigatória.');
  if (id) { const i = DB.financeiro.findIndex(x=>x.id===id); if(i>=0) DB.financeiro[i]=obj; } else DB.financeiro.push(obj);
  saveDB(); closeModal(); render();
}

// ══════════════════════════════════════════
// CRUD HELPERS
// ══════════════════════════════════════════
function delItem(coll, id) {
  if (!confirm('Confirmar exclusão?')) return;
  DB[coll] = DB[coll].filter(x => x.id !== id);
  saveDB(); render(); updateBadges();
}
function concludeItem(coll, id) {
  const item = DB[coll].find(x => x.id === id);
  if (item) { item.status = coll === 'prazos' ? 'Concluído' : 'Concluída'; saveDB(); render(); updateBadges(); }
}

// ══════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════
function exportarDados() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `lexoffice-backup-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importarDados() { document.getElementById('file-import').click(); }
function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.processos) return alert('Arquivo inválido.');
      if (!confirm(`Importar base com ${data.processos.length} processos, ${data.clientes?.length||0} clientes? Os dados atuais serão substituídos.`)) return;
      DB = data;
      saveDB(); render(); updateBadges();
      alert('Dados importados com sucesso!');
    } catch(err) { alert('Erro ao importar: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
}
